# Simple Frontend Pipeline
trigger:
  branches:
    include:
    - main
  paths:
    include:
    - frontend/src/**
    exclude:
    - frontend/src/**/*.md
    - frontend/src/**/*.txt


pool:
  vmImage: 'ubuntu-latest'

variables:
  - group: 'ScreenConnect-Variables'

stages:
- stage: Deploy
  displayName: 'Deploy Frontend'
  jobs:
  - job: Deploy
    displayName: 'Deploy Static Web App'
    steps:
    - task: Bash@3
      displayName: 'Update Configuration'
      inputs:
        targetType: 'inline'
        script: |
          SCRIPT_PATH="$(System.DefaultWorkingDirectory)/frontend/src/script.js"
          
          # Replace placeholder with Web App base URL (API_BASE_URL = hostname, e.g. myapp.azurewebsites.net)
          sed -i "s|https://your-webapp\.azurewebsites\.net/api|https://$(API_BASE_URL)/api|g" "$SCRIPT_PATH"
          
          echo "Configuration updated"
          echo "Updated API_BASE_URL to: https://$(API_BASE_URL)/api"

    - task: AzureCLI@2
      displayName: 'Deploy Static Web App'
      inputs:
        azureSubscription: '$(AZURE_SERVICE_CONNECTION)'
        scriptType: 'bash'
        scriptLocation: 'inlineScript'
        inlineScript: |
          npm install -g @azure/static-web-apps-cli
          swa deploy "$(System.DefaultWorkingDirectory)/frontend/src" --deployment-token "$(AZURE_STATIC_WEB_APPS_API_TOKEN)" --env production 