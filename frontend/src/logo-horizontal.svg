<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 80" width="300" height="80">
  <defs>
    <!-- Main gradient matching website theme -->
    <linearGradient id="brandGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563eb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#9333ea;stop-opacity:1" />
    </linearGradient>
    
    <!-- Accent gradient -->
    <linearGradient id="brandAccent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#60a5fa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a855f7;stop-opacity:1" />
    </linearGradient>
    
    <!-- Text gradient -->
    <linearGradient id="textGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1f2937;stop-opacity:1" />
      <stop offset="70%" style="stop-color:#2563eb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#9333ea;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Icon part -->
  <g transform="translate(10, 16)">
    <!-- Main screen/monitor shape -->
    <rect x="0" y="0" width="48" height="32" rx="6" ry="6" 
          fill="url(#brandGradient)"/>
    
    <!-- Screen content area -->
    <rect x="4" y="4" width="40" height="24" rx="3" ry="3" 
          fill="white" opacity="0.9"/>
    
    <!-- Connection network pattern -->
    <circle cx="12" cy="12" r="2" fill="url(#brandAccent)" opacity="0.8"/>
    <circle cx="24" cy="12" r="2" fill="url(#brandAccent)" opacity="0.8"/>
    <circle cx="36" cy="12" r="2" fill="url(#brandAccent)" opacity="0.8"/>
    
    <circle cx="18" cy="20" r="2" fill="url(#brandAccent)" opacity="0.8"/>
    <circle cx="30" cy="20" r="2" fill="url(#brandAccent)" opacity="0.8"/>
    
    <!-- Connection lines -->
    <line x1="12" y1="12" x2="24" y2="12" stroke="url(#brandAccent)" stroke-width="1.5" opacity="0.6"/>
    <line x1="24" y1="12" x2="36" y2="12" stroke="url(#brandAccent)" stroke-width="1.5" opacity="0.6"/>
    <line x1="18" y1="20" x2="30" y2="20" stroke="url(#brandAccent)" stroke-width="1.5" opacity="0.6"/>
    <line x1="18" y1="12" x2="18" y2="20" stroke="url(#brandAccent)" stroke-width="1.5" opacity="0.6"/>
    <line x1="30" y1="12" x2="30" y2="20" stroke="url(#brandAccent)" stroke-width="1.5" opacity="0.6"/>
    
    <!-- Monitor stand -->
    <rect x="20" y="32" width="8" height="6" rx="2" ry="2" 
          fill="url(#brandGradient)"/>
    
    <!-- Monitor base -->
    <rect x="12" y="38" width="24" height="4" rx="2" ry="2" 
          fill="url(#brandGradient)"/>
    
    <!-- Wireless signal indicator -->
    <g transform="translate(38, -4)">
      <path d="M0 8 Q4 4 8 8" stroke="url(#brandAccent)" stroke-width="2" 
            fill="none" opacity="0.8" stroke-linecap="round"/>
      <path d="M2 8 Q4 6 6 8" stroke="url(#brandAccent)" stroke-width="2" 
            fill="none" opacity="0.8" stroke-linecap="round"/>
      <circle cx="4" cy="8" r="1" fill="url(#brandAccent)"/>
    </g>
    
    <!-- Connection status indicator -->
    <circle cx="42" cy="8" r="2" fill="#10b981">
      <animate attributeName="opacity" values="0.4;1;0.4" dur="2s" repeatCount="indefinite"/>
    </circle>
  </g>
  
  <!-- Brand text -->
  <g transform="translate(75, 40)">
    <!-- Main brand name -->
    <text x="0" y="0" font-family="'Inter', 'Segoe UI', sans-serif" 
          font-size="32" font-weight="700" fill="url(#textGradient)">
      screenc
    </text>
    
    <!-- Domain extension -->
    <text x="118" y="0" font-family="'Inter', 'Segoe UI', sans-serif" 
          font-size="32" font-weight="400" fill="url(#brandAccent)">
      .me
    </text>
    
    <!-- Tagline -->
    <text x="0" y="18" font-family="'Inter', 'Segoe UI', sans-serif" 
          font-size="11" font-weight="400" fill="#64748b" opacity="0.8" 
          letter-spacing="0.1em">
      INSTANT REMOTE ACCESS
    </text>
  </g>
</svg> 