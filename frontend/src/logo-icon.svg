<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <!-- Main gradient matching website theme -->
    <linearGradient id="iconGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563eb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#9333ea;stop-opacity:1" />
    </linearGradient>
    
    <!-- Accent gradient -->
    <linearGradient id="iconAccent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#60a5fa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a855f7;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Main screen/monitor shape -->
  <rect x="8" y="12" width="48" height="32" rx="6" ry="6" 
        fill="url(#iconGradient)"/>
  
  <!-- Screen content area -->
  <rect x="12" y="16" width="40" height="24" rx="3" ry="3" 
        fill="white" opacity="0.9"/>
  
  <!-- Connection network pattern -->
  <circle cx="20" cy="24" r="2" fill="url(#iconAccent)" opacity="0.8"/>
  <circle cx="32" cy="24" r="2" fill="url(#iconAccent)" opacity="0.8"/>
  <circle cx="44" cy="24" r="2" fill="url(#iconAccent)" opacity="0.8"/>
  
  <circle cx="26" cy="32" r="2" fill="url(#iconAccent)" opacity="0.8"/>
  <circle cx="38" cy="32" r="2" fill="url(#iconAccent)" opacity="0.8"/>
  
  <!-- Connection lines -->
  <line x1="20" y1="24" x2="32" y2="24" stroke="url(#iconAccent)" stroke-width="1.5" opacity="0.6"/>
  <line x1="32" y1="24" x2="44" y2="24" stroke="url(#iconAccent)" stroke-width="1.5" opacity="0.6"/>
  <line x1="26" y1="32" x2="38" y2="32" stroke="url(#iconAccent)" stroke-width="1.5" opacity="0.6"/>
  <line x1="26" y1="24" x2="26" y2="32" stroke="url(#iconAccent)" stroke-width="1.5" opacity="0.6"/>
  <line x1="38" y1="24" x2="38" y2="32" stroke="url(#iconAccent)" stroke-width="1.5" opacity="0.6"/>
  
  <!-- Monitor stand -->
  <rect x="28" y="44" width="8" height="6" rx="2" ry="2" 
        fill="url(#iconGradient)"/>
  
  <!-- Monitor base -->
  <rect x="20" y="50" width="24" height="4" rx="2" ry="2" 
        fill="url(#iconGradient)"/>
  
  <!-- Wireless signal indicator -->
  <g transform="translate(46, 8)">
    <path d="M0 8 Q4 4 8 8" stroke="url(#iconAccent)" stroke-width="2" 
          fill="none" opacity="0.8" stroke-linecap="round"/>
    <path d="M2 8 Q4 6 6 8" stroke="url(#iconAccent)" stroke-width="2" 
          fill="none" opacity="0.8" stroke-linecap="round"/>
    <circle cx="4" cy="8" r="1" fill="url(#iconAccent)"/>
  </g>
  
  <!-- Connection status indicator -->
  <circle cx="50" cy="20" r="2" fill="#10b981">
    <animate attributeName="opacity" values="0.4;1;0.4" dur="2s" repeatCount="indefinite"/>
  </circle>
</svg> 