<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <!-- Main gradient matching website theme -->
    <linearGradient id="mainGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563eb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#9333ea;stop-opacity:1" />
    </linearGradient>
    
    <!-- Accent gradient for highlights -->
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#60a5fa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a855f7;stop-opacity:1" />
    </linearGradient>
    
    <!-- Glow filter for modern effect -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background circle with subtle glow -->
  <circle cx="100" cy="100" r="90" fill="url(#mainGradient)" filter="url(#glow)" opacity="0.1"/>
  
  <!-- Main screen/monitor shape -->
  <rect x="40" y="60" width="120" height="80" rx="12" ry="12" 
        fill="url(#mainGradient)" stroke="none"/>
  
  <!-- Screen content area -->
  <rect x="50" y="70" width="100" height="60" rx="6" ry="6" 
        fill="white" opacity="0.9"/>
  
  <!-- Connection dots pattern inside screen -->
  <circle cx="70" cy="90" r="3" fill="url(#accentGradient)" opacity="0.7"/>
  <circle cx="90" cy="90" r="3" fill="url(#accentGradient)" opacity="0.7"/>
  <circle cx="110" cy="90" r="3" fill="url(#accentGradient)" opacity="0.7"/>
  <circle cx="130" cy="90" r="3" fill="url(#accentGradient)" opacity="0.7"/>
  
  <circle cx="80" cy="110" r="3" fill="url(#accentGradient)" opacity="0.7"/>
  <circle cx="100" cy="110" r="3" fill="url(#accentGradient)" opacity="0.7"/>
  <circle cx="120" cy="110" r="3" fill="url(#accentGradient)" opacity="0.7"/>
  
  <!-- Connection lines between dots -->
  <line x1="70" y1="90" x2="90" y2="90" stroke="url(#accentGradient)" stroke-width="2" opacity="0.5"/>
  <line x1="90" y1="90" x2="110" y2="90" stroke="url(#accentGradient)" stroke-width="2" opacity="0.5"/>
  <line x1="110" y1="90" x2="130" y2="90" stroke="url(#accentGradient)" stroke-width="2" opacity="0.5"/>
  
  <line x1="80" y1="110" x2="100" y2="110" stroke="url(#accentGradient)" stroke-width="2" opacity="0.5"/>
  <line x1="100" y1="110" x2="120" y2="110" stroke="url(#accentGradient)" stroke-width="2" opacity="0.5"/>
  
  <line x1="80" y1="90" x2="90" y2="110" stroke="url(#accentGradient)" stroke-width="2" opacity="0.5"/>
  <line x1="100" y1="90" x2="100" y2="110" stroke="url(#accentGradient)" stroke-width="2" opacity="0.5"/>
  <line x1="120" y1="90" x2="110" y2="110" stroke="url(#accentGradient)" stroke-width="2" opacity="0.5"/>
  
  <!-- Monitor stand -->
  <rect x="90" y="140" width="20" height="15" rx="3" ry="3" 
        fill="url(#mainGradient)"/>
  
  <!-- Monitor base -->
  <rect x="70" y="155" width="60" height="8" rx="4" ry="4" 
        fill="url(#mainGradient)"/>
  
  <!-- Wireless connection symbol in top right -->
  <g transform="translate(145, 45)">
    <path d="M0 20 Q10 10 20 20" stroke="url(#accentGradient)" stroke-width="3" 
          fill="none" opacity="0.8" stroke-linecap="round"/>
    <path d="M5 20 Q10 15 15 20" stroke="url(#accentGradient)" stroke-width="3" 
          fill="none" opacity="0.8" stroke-linecap="round"/>
    <circle cx="10" cy="20" r="2" fill="url(#accentGradient)"/>
  </g>
  
  <!-- Power/connection indicator -->
  <circle cx="155" cy="75" r="4" fill="#10b981" opacity="0.8">
    <animate attributeName="opacity" values="0.4;1;0.4" dur="2s" repeatCount="indefinite"/>
  </circle>
</svg> 